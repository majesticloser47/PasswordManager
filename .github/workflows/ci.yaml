name: CI

on:
    push:
        branches:
            - master
            - dev
    pull_request:
        branches:
            - master
            - dev

jobs:
    test:
        name: Test (${{ matrix.os}}), Python ${{ matrix.python-version }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os:
                    - ubuntu-latest
                    - windows-latest
                    - macos-latest
                python-version:
                    - "3.13"
                    - "3.12"
                    - "3.11"

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: astral-sh/setup-uv@v3

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - run: pip install -e ".[dev]"

            - run: pre-commit run --all-files

            - run: uv run python -m build
