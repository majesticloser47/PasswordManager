name: CI

on:
    push:
        branches:
            - master
            - dev
    pull_request:
        branches:
            - master
            - dev

jobs:
    test:
        # name: Test (${{ matrix.os}}), Python ${{ matrix.python-version }})
        # runs-on: ${{ matrix.os }}
        # strategy:
        #     matrix:
        #         os:
        #             - ubuntu-latest
        #             - windows-latest
        #             - macos-latest
        #         python-version:
        #             - "3.13"
        #             - "3.12"
        #             - "3.11"

        name: Test only ubuntu
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Set up uv
              uses: astral-sh/setup-uv@v3
            - name: Set up python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - run: uv sync --group dev
            - run: uv add --dev pre-commit

            - run: pre-commit run --all-files
